<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#000000" />
    <title>인간 스톱워치 - 실시간 랭킹</title>
    <link
      rel="stylesheet"
      crossorigin
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css"
    />
    <link rel="stylesheet" href="css/styles.css" />
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🏆</text></svg>"
    />
  </head>
  <body>
    <div class="ranking-page">
      <div class="ranking-header">
        <h1 class="ranking-title">⏱️ 인간 스톱워치 실시간 랭킹</h1>
        <span class="ranking-sub" id="targetTimeSub">목표 시간 -초</span>
      </div>

      <div class="ranking-content">
        <h2 class="board-title">🏆 TOP 10</h2>
        <div id="boardList" class="board-list"></div>
        <div id="boardEmpty" class="board-empty hidden">아직 등록된 기록이 없습니다</div>
      </div>

      <div class="ticker" id="ticker" style="display: none">
        <span class="ticker-label">최근 기록</span>
        <div class="ticker-track" id="tickerTrack"></div>
      </div>

      <div id="newRecordOverlay" class="new-record-overlay hidden">
        <div class="new-record-badge">
          <span class="new-record-trophy">🏆</span>
          <span class="new-record-text">NEW RECORD</span>
          <span class="new-record-sub">1위를 갱신했습니다!</span>
        </div>
      </div>
    </div>

    <script
      crossorigin
      src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"
    ></script>
    <script src="js/config.js"></script>
    <script src="js/supabaseClient.js"></script>
    <script src="js/theme.js"></script>
    <script src="js/format.js"></script>
    <script src="js/rankingApi.js"></script>
    <script src="js/ranking.js"></script>
  </body>
</html>
