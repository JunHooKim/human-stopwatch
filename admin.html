<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#000000" />
    <title>인간 스톱워치 - 관리자</title>
    <link
      rel="stylesheet"
      crossorigin
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css"
    />
    <link rel="stylesheet" href="css/styles.css" />
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⚙️</text></svg>"
    />
  </head>
  <body>
    <!-- 로그인 화면 -->
    <div id="loginWrap" class="admin-login-wrap">
      <div class="card admin-login-card">
        <h1 class="admin-login-title">🔒 관리자 로그인</h1>
        <p class="admin-login-sub">인간 스톱워치 이벤트 관리자 페이지</p>
        <form id="loginForm" class="admin-login-form">
          <input
            type="password"
            id="passwordInput"
            class="admin-login-input"
            placeholder="비밀번호"
          />
          <span id="loginError" class="error-note hidden"></span>
          <button type="submit" id="loginBtn" class="btn btn-primary btn-full">로그인</button>
        </form>
      </div>
    </div>

    <!-- 관리자 메인 화면 -->
    <div id="adminMain" class="admin-page hidden">
      <div class="admin-container">
        <div class="admin-header">
          <h1 class="admin-title">⚙️ 관리자 페이지</h1>
          <button id="logoutBtn" class="btn btn-sm btn-secondary">로그아웃</button>
        </div>

        <div class="admin-grid">
          <!-- 리그별 목표 시간 / 초기화 -->
          <div class="card">
            <div>
              <div class="section-title">리그별 목표 시간</div>
              <div id="leagueSettingsList" class="league-settings-list"></div>
              <span id="savedNote" class="saved-note hidden">저장되었습니다</span>
            </div>
            <div class="divider"></div>
            <div>
              <div class="section-title">위험 구역</div>
              <div class="settings-row" style="margin-top: 12px">
                <button id="resetAllBtn" class="btn btn-sm btn-danger">전체 랭킹 초기화</button>
              </div>
            </div>
          </div>

          <!-- CSV -->
          <div class="card">
            <div class="section-title">랭킹 CSV</div>
            <div class="settings-row" style="margin-top: 12px">
              <button id="downloadCsvBtn" class="btn btn-sm btn-secondary">⬇ CSV 다운로드</button>
              <button id="uploadCsvBtn" class="btn btn-sm btn-secondary">⬆ CSV 업로드</button>
              <input type="file" id="csvFileInput" accept=".csv" hidden />
            </div>
            <p id="csvMessage" class="toast-msg hidden"></p>
          </div>
        </div>

        <!-- 기록 테이블 -->
        <div class="card">
          <div id="scoreLeagueFilter" class="league-tabs" style="margin-bottom: 16px"></div>
          <div class="table-wrap">
            <table class="admin-table">
              <thead>
                <tr>
                  <th>순위</th>
                  <th>닉네임</th>
                  <th>리그</th>
                  <th>목표</th>
                  <th>기록</th>
                  <th>오차</th>
                  <th>등록 시각</th>
                  <th>관리</th>
                </tr>
              </thead>
              <tbody id="scoreTableBody"></tbody>
            </table>
            <div id="scoreTableEmpty" class="table-empty hidden">등록된 기록이 없습니다</div>
          </div>
        </div>
      </div>
    </div>

    <script
      crossorigin
      src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"
    ></script>
    <script src="js/config.js"></script>
    <script src="js/supabaseClient.js"></script>
    <script src="js/theme.js"></script>
    <script src="js/format.js"></script>
    <script src="js/csv.js"></script>
    <script src="js/rankingApi.js"></script>
    <script src="js/admin.js"></script>
  </body>
</html>
