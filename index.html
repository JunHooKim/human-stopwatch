<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#000000" />
    <title>인간 스톱워치</title>
    <link
      rel="stylesheet"
      crossorigin
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css"
    />
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⏱️</text></svg>"
    />

    <style>
      :root {
        color-scheme: light dark;
        --bg: #f5f5f7;
        --bg-elevated: #ffffff;
        --surface: rgba(255, 255, 255, 0.72);
        --surface-solid: #ffffff;
        --border: rgba(0, 0, 0, 0.08);
        --text-primary: #1d1d1f;
        --text-secondary: #6e6e73;
        --text-tertiary: #86868b;
        --accent: #0071e3;
        --accent-strong: #0058b0;
        --success: #17c964;
        --danger: #ff3b30;
        --gold: #d4af37;
        --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.06), 0 1px 1px rgba(0, 0, 0, 0.04);
        --shadow-lg: 0 24px 64px rgba(0, 0, 0, 0.16), 0 8px 24px rgba(0, 0, 0, 0.08);
        --radius-full: 999px;
        --radius-lg: 28px;
        --radius-md: 18px;
        --ease-apple: cubic-bezier(0.28, 0.11, 0.32, 1);
      }
      :root.dark {
        --bg: #000000;
        --bg-elevated: #1c1c1e;
        --surface: rgba(28, 28, 30, 0.72);
        --surface-solid: #1c1c1e;
        --border: rgba(255, 255, 255, 0.1);
        --text-primary: #f5f5f7;
        --text-secondary: #a1a1a6;
        --text-tertiary: #8e8e93;
        --accent: #0a84ff;
        --accent-strong: #409cff;
        --success: #30d158;
        --danger: #ff453a;
        --gold: #f2c94c;
        --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.4);
        --shadow-lg: 0 24px 64px rgba(0, 0, 0, 0.55);
      }
      * { box-sizing: border-box; }
      html, body { height: 100%; }
      body {
        margin: 0;
        background: var(--bg);
        color: var(--text-primary);
        font-family: "Pretendard", -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Segoe UI", Roboto, sans-serif;
        -webkit-font-smoothing: antialiased;
        overscroll-behavior: none;
        transition: background-color 0.4s var(--ease-apple), color 0.4s var(--ease-apple);
      }
      h1, p { margin: 0; }
      button { font-family: inherit; border: none; background: none; cursor: pointer; -webkit-tap-highlight-color: transparent; }
      input { font-family: inherit; }
      a { color: inherit; text-decoration: none; }
      .tabular-nums { font-variant-numeric: tabular-nums; }
      .hidden { display: none !important; }

      .theme-toggle {
        position: fixed; top: 20px; right: 20px; z-index: 50;
        width: 44px; height: 44px; border-radius: 50%;
        display: flex; align-items: center; justify-content: center; font-size: 18px;
        background: var(--surface); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
        border: 1px solid var(--border); box-shadow: var(--shadow-sm);
        transition: transform 0.15s var(--ease-apple);
      }
      .theme-toggle:active { transform: scale(0.9); }

      .btn {
        display: inline-flex; align-items: center; justify-content: center; gap: 8px;
        font-weight: 600; letter-spacing: -0.01em; border-radius: var(--radius-full);
        padding: 14px 28px; font-size: 16px;
        transition: transform 0.15s var(--ease-apple), background-color 0.2s, opacity 0.2s;
      }
      .btn:active:not(:disabled) { transform: scale(0.96); }
      .btn:disabled { opacity: 0.4; cursor: not-allowed; }
      .btn-primary { background: var(--accent); color: #fff; box-shadow: var(--shadow-sm); }
      .btn-primary:hover:not(:disabled) { background: var(--accent-strong); }
      .btn-secondary { background: var(--bg-elevated); color: var(--text-primary); border: 1px solid var(--border); }
      .btn-secondary:hover:not(:disabled) { background: var(--surface); }

      .game-page {
        position: relative; height: 100dvh; width: 100%;
        display: flex; align-items: center; justify-content: center; overflow: hidden;
        background: radial-gradient(circle at 50% 0%, color-mix(in srgb, var(--accent) 8%, transparent) 0%, transparent 60%), var(--bg);
      }
      .footer-link {
        position: fixed; bottom: 18px; left: 50%; transform: translateX(-50%);
        font-size: 13px; color: var(--text-tertiary);
      }

      .start-screen {
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        text-align: center; gap: 18px; padding: 24px;
        animation: fadeUp 0.5s var(--ease-apple) both;
      }
      .start-badge { font-size: 13px; font-weight: 600; letter-spacing: 0.06em; color: var(--text-tertiary); text-transform: uppercase; }
      .start-title { font-size: clamp(40px, 9vw, 72px); font-weight: 800; letter-spacing: -0.03em; }
      .start-subtitle { font-size: clamp(16px, 2.4vw, 20px); color: var(--text-secondary); }
      .start-hint { color: var(--text-tertiary); font-size: 14px; margin-top: 4px; }

      .league-buttons { display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; margin-top: 8px; }
      .league-btn {
        display: flex; flex-direction: column; align-items: center; gap: 6px;
        width: 148px; padding: 28px 12px; border-radius: var(--radius-lg);
        background: var(--bg-elevated); border: 1px solid var(--border); box-shadow: var(--shadow-sm);
        transition: transform 0.15s var(--ease-apple), border-color 0.2s;
      }
      .league-btn:hover { border-color: var(--accent); }
      .league-btn:active { transform: scale(0.95); }
      .league-emoji { font-size: 32px; }
      .league-label { font-size: 17px; font-weight: 800; color: var(--text-primary); }
      .league-key-hint { font-size: 12px; color: var(--text-tertiary); }

      .countdown-overlay {
        position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
        background: var(--bg); z-index: 100;
      }
      .countdown-number {
        font-size: clamp(120px, 30vw, 280px); font-weight: 700; letter-spacing: -0.04em;
        font-variant-numeric: tabular-nums; animation: popIn 0.35s var(--ease-apple) both;
      }
      .countdown-go {
        font-size: clamp(100px, 24vw, 220px); font-weight: 800; color: var(--accent);
        letter-spacing: -0.02em; animation: popIn 0.35s var(--ease-apple) both;
      }
      @keyframes popIn { from { opacity: 0; transform: scale(0.4); } to { opacity: 1; transform: scale(1); } }

      .running-screen {
        position: relative; display: flex; flex-direction: column; align-items: center;
        justify-content: center; gap: 40px; height: 100%; width: 100%;
      }
      .running-pulse {
        position: absolute; width: min(70vw, 420px); height: min(70vw, 420px); border-radius: 50%;
        background: radial-gradient(circle, color-mix(in srgb, var(--danger) 22%, transparent) 0%, transparent 72%);
        pointer-events: none; animation: pulse 1.6s ease-in-out infinite;
      }
      @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 0.5; } 50% { transform: scale(1.08); opacity: 0.9; } }
      .stop-button {
        position: relative; width: min(56vw, 260px); height: min(56vw, 260px); border-radius: 50%;
        background: var(--danger); color: #fff; font-size: clamp(28px, 6vw, 40px); font-weight: 800;
        letter-spacing: 0.04em; box-shadow: 0 20px 60px color-mix(in srgb, var(--danger) 45%, transparent), var(--shadow-lg);
        animation: scaleIn 0.3s var(--ease-apple) both; transition: transform 0.15s var(--ease-apple);
      }
      .stop-button:active { transform: scale(0.92); }
      @keyframes scaleIn { from { opacity: 0; transform: scale(0.85); } to { opacity: 1; transform: scale(1); } }
      .running-hint { position: relative; color: var(--text-tertiary); font-size: 14px; }

      .result-screen {
        display: flex; flex-direction: column; align-items: center; gap: 28px; padding: 24px;
        width: 100%; max-width: 480px; text-align: center; animation: fadeUp 0.4s var(--ease-apple) both;
      }
      @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
      .result-league-title { font-size: clamp(20px, 3.4vw, 26px); font-weight: 800; letter-spacing: -0.01em; color: var(--accent); }
      .metrics { display: flex; gap: 12px; width: 100%; flex-wrap: wrap; }
      .metric-card {
        flex: 1 1 120px; min-width: 100px; padding: 20px 12px; border-radius: var(--radius-md);
        background: var(--bg-elevated); border: 1px solid var(--border);
        display: flex; flex-direction: column; gap: 6px;
      }
      .metric-label { font-size: 13px; color: var(--text-tertiary); font-weight: 600; }
      .metric-value { font-size: clamp(24px, 5vw, 32px); font-weight: 800; letter-spacing: -0.02em; }
      .diff-good { color: var(--success); }
      .rank-box {
        display: flex; align-items: center; justify-content: center; gap: 8px;
        padding: 14px 24px; border-radius: var(--radius-full);
        background: color-mix(in srgb, var(--accent) 12%, transparent); color: var(--accent);
        font-weight: 700; font-size: 16px; animation: scaleIn 0.35s var(--ease-apple) both;
      }
      .registered-note { color: var(--success); font-weight: 600; font-size: 15px; }
      .error-note { color: var(--danger); font-size: 14px; }

      .nickname-form { display: flex; flex-direction: column; align-items: center; gap: 14px; width: 100%; max-width: 360px; }
      .nickname-row { display: flex; gap: 10px; width: 100%; }
      .nickname-input {
        flex: 1; padding: 16px 18px; border-radius: var(--radius-full); border: 1px solid var(--border);
        background: var(--bg-elevated); color: var(--text-primary); font-size: 16px; outline: none;
        transition: border-color 0.2s;
      }
      .nickname-input:focus { border-color: var(--accent); }

      .new-record-overlay {
        position: fixed; inset: 0; z-index: 200; display: flex; align-items: center; justify-content: center;
        background: radial-gradient(circle at center, color-mix(in srgb, var(--accent) 22%, transparent) 0%, color-mix(in srgb, #000 60%, transparent) 100%);
        overflow: hidden; pointer-events: none; animation: fadeIn 0.4s both;
      }
      @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
      .new-record-particle { position: absolute; top: -6vh; width: 10px; height: 10px; border-radius: 3px; animation: fall linear both; }
      @keyframes fall {
        from { transform: translateY(0) rotate(0deg); opacity: 0; }
        10% { opacity: 1; } 90% { opacity: 1; }
        to { transform: translateY(116vh) rotate(360deg); opacity: 0; }
      }
      .new-record-badge {
        display: flex; flex-direction: column; align-items: center; gap: 8px; padding: 48px 64px;
        border-radius: var(--radius-lg); background: var(--surface-solid); box-shadow: var(--shadow-lg);
        text-align: center; animation: badgeIn 0.7s var(--ease-apple) both;
      }
      @keyframes badgeIn {
        0% { opacity: 0; transform: scale(0.3) rotate(-8deg); }
        60% { opacity: 1; transform: scale(1.15) rotate(0deg); }
        100% { opacity: 1; transform: scale(1) rotate(0deg); }
      }
      .new-record-trophy { font-size: 64px; line-height: 1; }
      .new-record-text {
        font-size: clamp(32px, 6vw, 52px); font-weight: 900; letter-spacing: -0.02em;
        background: linear-gradient(120deg, var(--gold), var(--accent));
        -webkit-background-clip: text; background-clip: text; color: transparent;
      }
      .new-record-sub { font-size: 16px; color: var(--text-secondary); font-weight: 600; }
    </style>
  </head>
  <body>
    <div class="game-page">
      <!-- 시작 화면 -->
      <div id="startScreen" class="start-screen">
        <span class="start-badge">⏱️ HUMAN STOPWATCH</span>
        <h1 class="start-title">인간 스톱워치</h1>
        <p class="start-subtitle">도전할 리그를 선택하세요</p>
        <div id="leagueButtons" class="league-buttons"></div>
        <p class="start-hint">숫자 키 1 / 2 / 3 으로도 선택할 수 있어요</p>
      </div>

      <!-- 진행 중 화면 (시간 숨김) -->
      <div id="runningScreen" class="running-screen hidden">
        <div class="running-pulse"></div>
        <button class="stop-button" id="stopBtn">STOP</button>
        <p class="running-hint">SPACE 키를 눌러도 정지할 수 있어요</p>
      </div>

      <!-- 결과 화면 -->
      <div id="resultScreen" class="result-screen hidden">
        <span id="resultLeagueTitle" class="result-league-title">5초 리그</span>
        <div class="metrics">
          <div class="metric-card">
            <span class="metric-label">실제 기록</span>
            <span class="metric-value tabular-nums" id="resultMeasured">-</span>
          </div>
          <div class="metric-card">
            <span class="metric-label">오차</span>
            <span class="metric-value tabular-nums" id="resultDiff">-</span>
          </div>
        </div>

        <div id="rankBox" class="rank-box hidden"></div>
        <span id="registeredNote" class="registered-note hidden">랭킹에 등록되었습니다!</span>

        <form id="nicknameForm" class="nickname-form">
          <div class="nickname-row">
            <input
              class="nickname-input"
              id="nicknameInput"
              placeholder="닉네임 입력 (최대 12자)"
              maxlength="12"
            />
            <button type="submit" class="btn btn-primary" id="submitScoreBtn">랭킹 등록</button>
          </div>
        </form>
        <span id="resultError" class="error-note hidden"></span>

        <div>
          <button class="btn btn-secondary" id="replayBtn">다시 도전하기</button>
        </div>
      </div>

      <!-- 카운트다운 오버레이 -->
      <div id="countdownOverlay" class="countdown-overlay hidden">
        <div id="countdownValue" class="countdown-number">3</div>
      </div>

      <!-- 신기록 오버레이 -->
      <div id="newRecordOverlay" class="new-record-overlay hidden">
        <div class="new-record-badge">
          <span class="new-record-trophy">🏆</span>
          <span class="new-record-text">NEW RECORD</span>
          <span class="new-record-sub">1위를 갱신했습니다!</span>
        </div>
      </div>

      <div class="footer-link" id="footerLink">
        <a href="ranking.html">🏆 랭킹 보기</a>
      </div>
    </div>

    <script crossorigin src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script>
      // ============================================================
      // ⚙️ 여기에 Supabase 프로젝트 정보를 입력하세요.
      // Supabase Dashboard > Project Settings > API 에서 확인할 수 있습니다.
      // ============================================================
      const APP_CONFIG = {
        SUPABASE_URL: "https://your-project.supabase.co",
        SUPABASE_ANON_KEY: "your-anon-key",
      };
      // ============================================================

      const sb = window.supabase.createClient(
        APP_CONFIG.SUPABASE_URL || "https://placeholder.supabase.co",
        APP_CONFIG.SUPABASE_ANON_KEY || "placeholder-anon-key",
        { auth: { persistSession: true, autoRefreshToken: true } },
      );

      if (!APP_CONFIG.SUPABASE_URL.startsWith("https://") || APP_CONFIG.SUPABASE_URL.includes("your-project")) {
        console.warn("[Supabase] 이 파일 상단의 APP_CONFIG 값을 실제 프로젝트 정보로 채워주세요.");
      }

      // ----- 포맷 유틸 -----
      const Format = {
        seconds(value, digits = 3) {
          return `${value.toFixed(digits)}초`;
        },
        difference(value, digits = 3) {
          const sign = value > 0 ? "+" : value < 0 ? "" : "±";
          return `${sign}${value.toFixed(digits)}초`;
        },
        escapeHtml(str) {
          const div = document.createElement("div");
          div.textContent = str;
          return div.innerHTML;
        },
      };

      // ----- 랭킹/리그 데이터 접근 -----
      const RankingApi = {
        async fetchLeagues() {
          const { data, error } = await sb
            .from("leagues")
            .select("*")
            .order("sort_order", { ascending: true });
          if (error) throw error;
          return data ?? [];
        },
        subscribeLeagues(onChange) {
          const channel = sb
            .channel("leagues_changes_" + Math.random().toString(36).slice(2))
            .on("postgres_changes", { event: "*", schema: "public", table: "leagues" }, () => onChange())
            .subscribe();
          return () => sb.removeChannel(channel);
        },
        async fetchBestDifference(leagueKey) {
          const { data, error } = await sb
            .from("scores")
            .select("difference")
            .eq("league_key", leagueKey)
            .order("difference", { ascending: true })
            .order("created_at", { ascending: true })
            .limit(1)
            .maybeSingle();
          if (error) throw error;
          return data ? Number(data.difference) : null;
        },
        async insertScore(input) {
          const { data, error } = await sb.from("scores").insert(input).select("*").single();
          if (error) throw error;
          return data;
        },
        async fetchRankOf(score) {
          const { count: betterCount, error: e1 } = await sb
            .from("scores")
            .select("id", { count: "exact", head: true })
            .eq("league_key", score.league_key)
            .lt("difference", score.difference);
          if (e1) throw e1;

          const { count: tieEarlierCount, error: e2 } = await sb
            .from("scores")
            .select("id", { count: "exact", head: true })
            .eq("league_key", score.league_key)
            .eq("difference", score.difference)
            .lt("created_at", score.created_at);
          if (e2) throw e2;

          return (betterCount ?? 0) + (tieEarlierCount ?? 0) + 1;
        },
      };

      // ----- 다크모드 -----
      const Theme = {
        KEY: "human-stopwatch-theme",
        init() {
          const stored = localStorage.getItem(Theme.KEY);
          const theme =
            stored === "light" || stored === "dark"
              ? stored
              : window.matchMedia?.("(prefers-color-scheme: dark)").matches
                ? "dark"
                : "light";
          Theme.apply(theme);
        },
        apply(theme) {
          document.documentElement.classList.toggle("dark", theme === "dark");
          localStorage.setItem(Theme.KEY, theme);
        },
        toggle() {
          const isDark = document.documentElement.classList.contains("dark");
          Theme.apply(isDark ? "light" : "dark");
          Theme.updateIcon();
        },
        updateIcon() {
          const btn = document.querySelector("[data-theme-toggle]");
          if (!btn) return;
          const isDark = document.documentElement.classList.contains("dark");
          btn.textContent = isDark ? "☀️" : "🌙";
        },
        mount() {
          const btn = document.createElement("button");
          btn.className = "theme-toggle";
          btn.setAttribute("data-theme-toggle", "");
          btn.setAttribute("aria-label", "다크/라이트 모드 전환");
          btn.addEventListener("click", Theme.toggle);
          document.body.appendChild(btn);
          Theme.updateIcon();
        },
      };
      Theme.init();

      // ----- 게임 로직 -----
      (function () {
        const COUNTDOWN_STEPS = [3, 2, 1];
        const COUNTDOWN_STEP_MS = 800;
        const LEAGUE_EMOJI = { "3s": "⚡", "5s": "🎯", "10s": "⏱️" };

        const els = {
          startScreen: document.getElementById("startScreen"),
          leagueButtons: document.getElementById("leagueButtons"),
          runningScreen: document.getElementById("runningScreen"),
          resultScreen: document.getElementById("resultScreen"),
          resultLeagueTitle: document.getElementById("resultLeagueTitle"),
          countdownOverlay: document.getElementById("countdownOverlay"),
          countdownValue: document.getElementById("countdownValue"),
          newRecordOverlay: document.getElementById("newRecordOverlay"),
          footerLink: document.getElementById("footerLink"),
          stopBtn: document.getElementById("stopBtn"),
          replayBtn: document.getElementById("replayBtn"),
          nicknameForm: document.getElementById("nicknameForm"),
          nicknameInput: document.getElementById("nicknameInput"),
          submitScoreBtn: document.getElementById("submitScoreBtn"),
          resultMeasured: document.getElementById("resultMeasured"),
          resultDiff: document.getElementById("resultDiff"),
          rankBox: document.getElementById("rankBox"),
          registeredNote: document.getElementById("registeredNote"),
          resultError: document.getElementById("resultError"),
        };

        let phase = "idle"; // idle | countdown | running | result
        let leagues = [];
        let selectedLeague = null;
        let startTimestamp = null;
        let measuredTime = null;
        let difference = null;
        const timeouts = [];

        Theme.mount();

        function clearTimers() {
          timeouts.forEach((t) => clearTimeout(t));
          timeouts.length = 0;
        }
        function show(el) { el.classList.remove("hidden"); }
        function hide(el) { el.classList.add("hidden"); }

        function setPhase(next) {
          phase = next;
          hide(els.startScreen);
          hide(els.runningScreen);
          hide(els.resultScreen);
          hide(els.countdownOverlay);
          hide(els.footerLink);

          if (next === "idle") {
            show(els.startScreen);
            show(els.footerLink);
          } else if (next === "countdown") {
            show(els.countdownOverlay);
          } else if (next === "running") {
            show(els.runningScreen);
          } else if (next === "result") {
            show(els.resultScreen);
          }
        }

        // 리그를 못 불러와도(설정 전이라도) 기본 3/5/10초로 즉시 플레이 가능하게 폴백 제공
        const FALLBACK_LEAGUES = [
          { key: "3s", label: "3초 리그", target_time: 3 },
          { key: "5s", label: "5초 리그", target_time: 5 },
          { key: "10s", label: "10초 리그", target_time: 10 },
        ];

        async function loadLeagues() {
          try {
            const data = await RankingApi.fetchLeagues();
            leagues = data.length > 0 ? data : FALLBACK_LEAGUES;
          } catch (err) {
            console.warn("리그 정보를 불러오지 못해 기본값(3/5/10초)을 사용합니다.", err);
            leagues = FALLBACK_LEAGUES;
          }
          renderLeagueButtons();
        }

        function renderLeagueButtons() {
          els.leagueButtons.innerHTML = "";
          leagues.forEach((league, i) => {
            const btn = document.createElement("button");
            btn.className = "league-btn";
            btn.dataset.key = league.key;
            btn.innerHTML = `
              <span class="league-emoji">${LEAGUE_EMOJI[league.key] ?? "🏁"}</span>
              <span class="league-label">${Format.escapeHtml(league.label)}</span>
              <span class="league-key-hint">키보드 ${i + 1}</span>
            `;
            btn.addEventListener("click", () => start(league));
            els.leagueButtons.appendChild(btn);
          });
        }

        function start(league) {
          if (phase !== "idle" && phase !== "result") return;
          if (!league) return;
          selectedLeague = league;
          clearTimers();
          measuredTime = null;
          difference = null;
          setPhase("countdown");

          COUNTDOWN_STEPS.forEach((step, i) => {
            timeouts.push(
              setTimeout(() => {
                els.countdownValue.textContent = String(step);
                els.countdownValue.classList.remove("countdown-number");
                void els.countdownValue.offsetWidth;
                els.countdownValue.classList.add("countdown-number");
              }, i * COUNTDOWN_STEP_MS),
            );
          });

          timeouts.push(
            setTimeout(
              () => {
                els.countdownValue.textContent = "GO";
                els.countdownValue.classList.remove("countdown-number", "countdown-go");
                void els.countdownValue.offsetWidth;
                els.countdownValue.classList.add("countdown-go");
                startTimestamp = performance.now();
                setPhase("running");
              },
              COUNTDOWN_STEPS.length * COUNTDOWN_STEP_MS,
            ),
          );
        }

        function stop() {
          if (phase !== "running" || startTimestamp === null || !selectedLeague) return;
          const elapsedMs = performance.now() - startTimestamp;
          measuredTime = elapsedMs / 1000;
          difference = Math.abs(measuredTime - Number(selectedLeague.target_time));
          startTimestamp = null;
          renderResult();
          setPhase("result");
        }

        function renderResult() {
          els.resultLeagueTitle.textContent = selectedLeague.label;
          els.resultMeasured.textContent = Format.seconds(measuredTime);
          const diffSigned = measuredTime - Number(selectedLeague.target_time);
          els.resultDiff.textContent = Format.difference(diffSigned);
          els.resultDiff.classList.toggle("diff-good", Math.abs(diffSigned) < 0.05);

          hide(els.rankBox);
          hide(els.registeredNote);
          hide(els.resultError);
          show(els.nicknameForm);
          els.nicknameInput.value = "";
          els.nicknameInput.disabled = false;
          els.submitScoreBtn.disabled = false;
          els.submitScoreBtn.textContent = "랭킹 등록";
        }

        function reset() {
          clearTimers();
          startTimestamp = null;
          measuredTime = null;
          difference = null;
          setPhase("idle");
        }

        async function handleSubmit(e) {
          e.preventDefault();
          if (measuredTime === null || difference === null || !selectedLeague) return;
          const nickname = els.nicknameInput.value.trim();
          hide(els.resultError);

          if (!nickname) {
            showError("닉네임을 입력해주세요");
            return;
          }
          if (nickname.length > 12) {
            showError("닉네임은 12자 이내로 입력해주세요");
            return;
          }

          els.nicknameInput.disabled = true;
          els.submitScoreBtn.disabled = true;
          els.submitScoreBtn.textContent = "등록 중…";

          try {
            const bestBefore = await RankingApi.fetchBestDifference(selectedLeague.key);
            const saved = await RankingApi.insertScore({
              nickname,
              league_key: selectedLeague.key,
              target_time: Number(selectedLeague.target_time),
              measured_time: measuredTime,
              difference,
            });
            const rank = await RankingApi.fetchRankOf(saved);

            hide(els.nicknameForm);
            els.rankBox.textContent = `🏅 ${selectedLeague.label} 현재 랭킹 ${rank}위`;
            show(els.rankBox);
            show(els.registeredNote);

            if (bestBefore === null || difference < bestBefore) {
              celebrateNewRecord();
            }
          } catch (err) {
            showError(err?.message || "등록 중 오류가 발생했습니다. Supabase 설정을 확인해주세요.");
            els.nicknameInput.disabled = false;
            els.submitScoreBtn.disabled = false;
            els.submitScoreBtn.textContent = "랭킹 등록";
          }
        }

        function showError(msg) {
          els.resultError.textContent = msg;
          show(els.resultError);
        }

        function celebrateNewRecord() {
          els.newRecordOverlay.querySelectorAll(".new-record-particle").forEach((p) => p.remove());
          const colors = ["var(--accent)", "var(--gold)"];
          for (let i = 0; i < 18; i += 1) {
            const p = document.createElement("span");
            p.className = "new-record-particle";
            p.style.left = `${(i * 97) % 100}%`;
            p.style.background = colors[i % 2];
            const duration = 2.2 + (i % 5) * 0.3;
            const delay = i * 0.05;
            p.style.animationDuration = `${duration}s`;
            p.style.animationDelay = `${delay}s`;
            els.newRecordOverlay.appendChild(p);
          }
          show(els.newRecordOverlay);
          setTimeout(() => hide(els.newRecordOverlay), 3200);
        }

        // ----- 이벤트 바인딩 -----
        els.stopBtn.addEventListener("click", stop);
        els.replayBtn.addEventListener("click", reset);
        els.nicknameForm.addEventListener("submit", handleSubmit);

        window.addEventListener("keydown", (e) => {
          const target = e.target;
          const isTyping = target && (target.tagName === "INPUT" || target.tagName === "TEXTAREA");
          if (isTyping) return;

          if (["Digit1", "Digit2", "Digit3"].includes(e.code) && phase === "idle") {
            const idx = Number(e.code.slice(-1)) - 1;
            if (leagues[idx]) {
              e.preventDefault();
              start(leagues[idx]);
            }
          } else if (e.code === "Enter" && phase === "result") {
            e.preventDefault();
            reset();
          } else if (e.code === "Space" && phase === "running") {
            e.preventDefault();
            stop();
          }
        });

        loadLeagues();
        setPhase("idle");
      })();
    </script>
  </body>
</html>
