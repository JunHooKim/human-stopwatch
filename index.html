<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#000000" />
    <title>인간 스톱워치</title>
    <meta
      name="description"
      content="목표 시간에 가장 가깝게 STOP 버튼을 눌러보세요 — 인간 스톱워치 챌린지"
    />
    <link
      rel="stylesheet"
      crossorigin
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css"
    />
    <link rel="stylesheet" href="css/styles.css" />
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⏱️</text></svg>"
    />
  </head>
  <body>
    <div class="game-page">
      <!-- 시작 화면 -->
      <div id="startScreen" class="start-screen">
        <span class="start-badge">⏱️ HUMAN STOPWATCH</span>
        <h1 class="start-title">인간 스톱워치</h1>
        <p class="start-subtitle">
          목표 시간
          <strong class="tabular-nums" id="targetTimeLabel">10.000초</strong>에
          가장 가깝게 STOP을 눌러보세요
        </p>
        <button class="start-button" id="startBtn">시작</button>
        <p class="start-hint">ENTER 키로도 시작할 수 있어요</p>
      </div>

      <!-- 진행 중 화면 (시간 숨김) -->
      <div id="runningScreen" class="running-screen hidden">
        <div class="running-pulse"></div>
        <button class="stop-button" id="stopBtn">STOP</button>
        <p class="running-hint">SPACE 키를 눌러도 정지할 수 있어요</p>
      </div>

      <!-- 결과 화면 -->
      <div id="resultScreen" class="result-screen hidden">
        <div class="metrics">
          <div class="metric-card">
            <span class="metric-label">목표 시간</span>
            <span class="metric-value tabular-nums" id="resultTarget">-</span>
          </div>
          <div class="metric-card">
            <span class="metric-label">실제 기록</span>
            <span class="metric-value tabular-nums" id="resultMeasured">-</span>
          </div>
          <div class="metric-card">
            <span class="metric-label">오차</span>
            <span class="metric-value tabular-nums" id="resultDiff">-</span>
          </div>
        </div>

        <div id="rankBox" class="rank-box hidden"></div>
        <span id="registeredNote" class="registered-note hidden">랭킹에 등록되었습니다!</span>

        <form id="nicknameForm" class="nickname-form">
          <div class="nickname-row">
            <input
              class="nickname-input"
              id="nicknameInput"
              placeholder="닉네임 입력 (최대 12자)"
              maxlength="12"
            />
            <button type="submit" class="btn btn-primary" id="submitScoreBtn">랭킹 등록</button>
          </div>
        </form>
        <span id="resultError" class="error-note hidden"></span>

        <div>
          <button class="btn btn-secondary" id="replayBtn">다시 도전하기</button>
        </div>
      </div>

      <!-- 카운트다운 오버레이 -->
      <div id="countdownOverlay" class="countdown-overlay hidden">
        <div id="countdownValue" class="countdown-number">3</div>
      </div>

      <!-- 신기록 오버레이 -->
      <div id="newRecordOverlay" class="new-record-overlay hidden">
        <div class="new-record-badge">
          <span class="new-record-trophy">🏆</span>
          <span class="new-record-text">NEW RECORD</span>
          <span class="new-record-sub">1위를 갱신했습니다!</span>
        </div>
      </div>

      <div class="footer-link" id="footerLink">
        <a href="ranking.html">🏆 랭킹 보기</a>
      </div>
    </div>

    <script
      crossorigin
      src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"
    ></script>
    <script src="js/config.js"></script>
    <script src="js/supabaseClient.js"></script>
    <script src="js/theme.js"></script>
    <script src="js/format.js"></script>
    <script src="js/rankingApi.js"></script>
    <script src="js/game.js"></script>
  </body>
</html>
